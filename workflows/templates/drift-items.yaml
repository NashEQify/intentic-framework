# Template: drift-items.yaml — Source-Spec-Reduktion-Required-Artefakt
#
# Skill: skills/source_spec_reduce/SKILL.md
# Generated by: build-Workflow Step `source-spec-reduce` (post-spec-write)
# Output-Pfad: docs/build/<build-id>/drift-items.yaml
#
# 3-Wege-Triage pro Drift-Sektion:
#   - existing-task: Sektion wird durch existing aktive Task absorbiert
#                    (target = Task-ID; Sektion bleibt in Source bis target done)
#   - new-task:      Echte Plan-Luecke; neue Task pflichtig via task_creation
#                    (target = neue Task-ID; Sektion bleibt in Source bis neue Task done)
#   - die:           Sektion ist obsolet (target = null; Sektion stirbt mit Source)

build_id: build-NNN-YYYYMMDD       # Build-Workflow-Run-Identifier
task_ref: NNN                      # Build-Task-ID (canonical state-file-key per
                                   # workflows/workflow-template.md §Frontmatter-Schema).
                                   # NICHT `parent_task:` — das ist task-yaml-only
                                   # (sub-task-hierarchy, framework/task-format.md).
source_spec: <source-spec>.md      # Source-Spec-Pfad (relative zu docs/specs/)
generated: 'YYYY-MM-DD'            # ISO-Datum der drift-items-Erstellung

# Source-LOC-Tracking (Source-Aufloesungs-Indikator)
source_loc_pre: 0                  # LOC vor Reduktion
source_loc_post: 0                 # LOC nach Reduktion
fully_dissolved: false             # true wenn Source nur noch Pointer-Stubs hat

# Drift-Sektionen (Sektionen die NICHT durch NEU-Spec abgedeckt sind)
items:
  - section_ref: "§X.Y Sektions-Titel"
    decision: existing-task        # existing-task | new-task | die
    target: NNN                    # Task-ID or null bei decision=die
    rationale: >
      rationale der Decision (1-2 Saetze).

# Cross-Refs
related_workflow_step: cross-spec-consistency-check (vorausgehend, drift-list-cross.md)
authority: consumer-defined Spec-Lifecycle-Policy ADR (siehe Consumer-Projekt)
