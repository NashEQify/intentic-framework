  domain: framework/runtime-distribution
  objective: codex-plugin-exportability
  action: >
    Package skills + workflow_engine + adapter as a Codex-compatible plugin
    bundle (plugin.json manifest + .mcp.json wrap of workflow_engine + optional
    .app.json + marketplace.json), so the framework's discipline+skill layer
    is installable on the Codex CLI alongside the existing CC + OpenCode
    adapters.
summary: >
  Codex CLI ships a manifest-driven plugin format (`.codex-plugin/plugin.json`
  + `skills/<name>/SKILL.md` + optional `.mcp.json` + `.app.json` +
  marketplace.json). Skills are SKILL.md+Frontmatter — *identisch* zu unserem
  Format. Pivotal Codex-Quote: "Skills are the authoring format; plugins are
  the distribution format." Wir produzieren bereits im Authoring-Format,
  ohne Plugin-Wrapping.

  Gaps für vollständigen Export:
  (1) plugin.json Manifest-Generator (Mapping über Skill-Inventar + Metadata)
  (2) workflow_engine.py als MCP-Server wrapbar (`--mcp` flag oder separater
      Entry-Point) — sonst keine Discipline-Mechanik im Plugin transportabel
  (3) marketplace.json an Repo-Scope (`.agents/plugins/marketplace.json`)
      und/oder Personal-Scope (`~/.agents/plugins/marketplace.json`)
  (4) Adapter `orchestrators/codex/` (analog zu opencode/, claude-code/)
  (5) Skill-Frontmatter-Audit: gibt's CC-spezifische Felder, die Codex nicht
      parst? Falls ja, abstrahieren oder dokumentieren als CC-only.
  (6) Hook-Audit: PreToolUse-Hooks sind Claude-Code-spezifisch — was lässt
      sich als MCP-Tool ausdrücken (validate-X), was bleibt CC-only, was
      könnte als pre-commit-script (harness-unabhängig) ausgedrückt werden?

  Roadmap-Item, NICHT 1.0-Blocker. Priorität bleibt Discipline-Tightening +
  Skill-Inventar erweitern.
