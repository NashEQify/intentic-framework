status_notes: >
  Originated 2026-05-10 in same session as spec 306 §14 amendment
  (brief-architect spec_amendment + retro_spec_update modes). The §14
  amendment closed a fresh-context-author gap at the spec corpus boundary;
  task 314 closes a fresh-context-distill gap at the build closing boundary.
  Same lift-pattern (cc methodology, framework-shaped extension).

  Open question to resolve in spec phase: persona placement — extend
  brief-architect with a 4th mode (mode=build_retro) for pattern
  consistency, or introduce a separate retro persona. Pro-extension:
  read-only, fresh-context, structured-prose-return — same shape as
  existing 3 modes. Anti-extension: brief-architect is getting fat;
  naming-collision risk (mode=retro_spec_update vs mode=build_retro
  both have "retro" in them).
