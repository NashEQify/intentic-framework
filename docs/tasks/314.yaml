intent_chain:
  domain: framework/workflow-discipline
  objective: cross-build-lessons-pipeline + close-phase-coherence
  action: >
    Insert a new build_retro gate in the build workflow (between
    spec-drift-check and close-bookkeeping) that lifts the autoDream
    4-stage pattern (orient/gather/consolidate/prune) from upstream cc
    to distill build artifacts into a structured retro 1-pager. Use the
    retro output as the consolidated input for the existing close-
    bookkeeping sub-steps (ADR-discipline / risk-followup-routing /
    knowledge-process), restructuring close as distill→emit rather than
    three independent sub-checks.
summary: >
  Build-468 surfaced a real friction-and-lessons-pipeline gap: lessons
  emerging across a build's whole arc (patterns, stale decisions,
  framework-feed candidates) are captured ad-hoc (build-468-learnings.md
  is the proof artifact, but user-initiated, not gate-driven). The
  existing close-bookkeeping sub-steps are emission-shaped (write ADR,
  file follow-up, knowledge-process) — they don't produce the distilled
  signal that they emit; that distill step is missing.

  Upstream cc has memory-consolidation patterns (extractMemories,
  autoDream/DreamTask) but NO build-completion gate — cc has no build
  lifecycle. autoDream's 4-stage prompt structure (orient/gather/
  consolidate/prune) is liftable as the methodology for forge's
  build_retro gate; the gate itself is framework-original because the
  underlying primitive (build-as-discrete-work-unit) doesn't exist
  upstream.

  Close-bookkeeping consolidation: the existing 3 sub-steps (ADR /
  risk-followup-routing / knowledge-process) are natural consumers of
  retro output — distill→emit shape. Restructure close as a single
  phase with build_retro as the distill front-half, existing sub-steps
  as the emit back-half consuming structured retro output.
