summary: >
  Personas (Buddy/MCA/Sub-Agents/Reviewer-Personas) koennen in Skill-Outputs
  Source-Behauptungen mit fabrizierten Tool-Outputs untermauern.
  Reviewer-Personas koennen fabricated Source-Verifikation nicht von realer
  unterscheiden — fabricated Authority propagiert.

  Mitigation per Pfad E (gelockt nach Council-Synthesis 2026-05-04):
  Pointer-Schema mit `quote:`-Field, Engine-Check via grep -F Quote-Match
  am Workflow-Step-Boundary, optional CC-PostToolUse-Hook fuer Tier-1.

  Schicht 1 (Schema) + Schicht 2 (Engine-Check) gelten ueberall wo die
  Fehlerklasse zutrifft (alle 13 Source-Verifikations-Skills + alle
  Reviewer-Personas via reviewer-base.md-Vererbung). Schicht 3 (CC-Hook)
  nur fuer Tier-1: spec_board, code_review_board,
  architecture_coherence_review, sectional_deep_review, adversary_test_plan,
  spec_amendment_verification.

  Nicht in Phase 1: Reviewer-Audit-Discipline (M2-Lean) — User-Constraint
  mechanisch-only filtert LLM-getriebene Audit-Schichten als primary
  mechanism aus.
