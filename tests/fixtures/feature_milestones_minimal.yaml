# Test-Fixture fuer plan_engine.load_plan feature_milestones-Schema
# Anweisung 434.7 §5.2 Sub-Step 9, post-2026-05-03 Greenfield
# Deckt ab: alle Pflicht-Felder + alle Optional-Felder pro Schema-File §1
# Locks-File §4 §2 Update: target:M2 + M3-M7 + Pre-Set-Gates fuer alle 8 +
# app_status_post_milestone in alle Fixtures (Pflicht post-Locks-File §3 F-C-017)

target: M2

feature_milestones:
