    # M1.5-spezifische Optional-Felder (Schema-Coverage-kritisch)
    parallel_to: [M1]
    sysadmin_methodology_import: "/test/sysadmin/path"
    buddyai_infra_audit: "test/audit/path.md"
    gap_ownership_anchor_task: 9999

