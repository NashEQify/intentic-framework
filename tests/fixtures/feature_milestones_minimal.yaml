    # Pflicht-Felder (alle 9 inkl. app_status_post_milestone)
    name: "Test-Pure-Chat"
    feature: "Test-feature description"
    capabilities: [TestHarness, TestLLM]
    specs: [test-spec-1.md, test-spec-2.md]
    blocked_by: []
    fallback_strategy:
      - "Test fallback strategy"
    requires: []
    gate:
      - {type: task, id: 1001, desc: "Test-task done"}
      - {type: validate, ref: "plan_engine clean", preliminary: true}
      - {type: coverage, ref: "frontmatter >= 80%", preliminary: true}
      - {type: spec_review, ref: "Capability-Foundation §1.6", preliminary: true}
    app_status_post_milestone: "Test app nutzbar"
    # Optional-Felder
    cross_cutting: [test-multi-tenancy, "test-compliance-hooks (Hook-Points only)"]
    frontend_components:
      - "Test Chat-UI"
      - "Test Tenant-Switcher"
    backend_refactor_components:
      - "Test API-Pfad-Migration"

  M1.5:
